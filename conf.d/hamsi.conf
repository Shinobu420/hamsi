# Custom Hamsi Settings
#

# Choose your locally hosted Ollama model
# Recommended fast model: qwen2.5-coder:1.5b
model = qwen2.5-coder:1.5b

# Set the Ollama API endpoint
api_url = http://localhost:11434/api/generate

# Specify how many past commands to send for context
history_limit = 5

# Configure keybindings
# Trigger completion (default: Ctrl+O)
keybinding = \co

# Accept suggestion (default: Ctrl+Y)
accept_keybinding = \cy

# Allow command chaining and pipes (|, ;, &&) in suggestions
# Default: false (stops generation at pipes or semicolons for safety)
allow_chaining = false
